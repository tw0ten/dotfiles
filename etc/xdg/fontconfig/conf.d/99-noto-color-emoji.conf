<?xml version="1.0"?>
<!DOCTYPE fontconfig>
<fontconfig>
	<match target="font">
		<test name="family">
			<string>Noto Color Emoji</string>
		</test>

		<edit name="pixelsizefixupfactor" mode="assign">
			<divide>
				<name target="pattern">pixelsize</name>
				<name target="font">pixelsize</name>
			</divide>
		</edit>

		<edit name="matrix" mode="assign">
			<times>
				<name>matrix</name>
				<matrix>
					<name>pixelsizefixupfactor</name>
					<double>0</double>
					<double>0</double>
					<name>pixelsizefixupfactor</name>
				</matrix>
			</times>
		</edit>
	</match>
</fontconfig>
