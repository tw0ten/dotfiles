<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<alias>
		<family>serif</family>
		<prefer><family>system-ui</family></prefer>
	</alias>
	<alias>
		<family>sans-serif</family>
		<prefer><family>system-ui</family></prefer>
	</alias>

	<match target="pattern">
		<test name="family">
			<string>system-ui</string>
		</test>
		<edit name="family" mode="assign" binding="strong">
			<string>art</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="family">
			<string>monospace</string>
		</test>
		<edit name="family" mode="assign" binding="strong">
			<string>art.mono</string>
			<string>art</string>
		</edit>
	</match>
</fontconfig>
